  "/users":
    get:
      summary: List users
      description: Administrative endpoint to retrieve users.
      tags: [User]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/pageParam"
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/sortTypeParam"
        - in: query
          name: sortBy
          description: Sort by updatedAt, createdAt
          required: false
          schema:
            type: string
            enum: [updatedAt, createdAt]
            example: updatedAt
        - in: query
          name: name
          schema:
            type: string
            example: Siam
        - in: query
          name: email
          schema:
            type: string
            format: email
            example: test@gmail.com
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, blocked, declined]
            example: pending
      responses:
        "200":
          description: Get all user data
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 200
                  message:
                    type: string
                    example: Data retrieved
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
                  links:
                    type: object
                    properties:
                      self:
                        type: string
                        format: uri
                        example: "/users?page=2&limit=10"
                      next:
                        type: string
                        format: uri
                        example: "/users?page=3&limit=10"
                      prev:
                        type: string
                        format: uri
                        example: "/users?page=1&limit=10"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

    post:
      summary: Create user
