openapi: 3.0.0
info:
  version: "1.0.0"
  title: "Blog Management System"
  description: |
    A scalable Blog Management System API that enables users to register, verify their email, and
    authenticate using JWT-based authentication (access and refresh tokens). The system supports
    secure password management, including password change and email-based password reset
    functionality.

    Authenticated users can create, update, publish, and delete blog posts, as well as engage with
    content through comments. The platform enforces role-based access control (RBAC), allowing
    administrators to manage system resources while regular users interact with blog content.

    The API provides advanced querying capabilities such as pagination, filtering, sorting, and 
    searching to efficiently retrieve blog data.

    The application follows production-grade backend practices including caching, structured logging,
    automated testing, and comprehensive error handling.

    For scalable and reliable deployment, the system is containerized using Docker and supports load
    balancing, database replication, and CI/CD pipelines

  contact:
    name: Md Ismile Hosen Siam
    email: siam679ihs@gmail.com

servers:
  - description: dev
    url: http://localhost:4000/api/v1

tags:
  - name: Auth
    description: Auth endpoints
  - name: Article
    description: Article endpoints
  - name: Comment
    description: Comment endpoints
  - name: User
    description: User endpoints

paths:
  "/auth/sign-up":
    post:
      summary: Create user account
      description: Register a new user account and sends verification email to user.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Sign-up successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 201
                  message:
                    type: string
                    example: Account created. An activation token sent to your email.
                  data:
                    allOf:
                      - $ref: "#/components/schemas/UserCreateUpdateResponse"
                      - type: object
                        properties:
                          status:
                            type: string
                            enum: [pending, approved, blocked, declined]
                            example: pending
                  links:
                    type: object
                    properties:
                      self:
                        type: string
                        format: uri
                        example: "/auth/sign-up"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

  "/auth/setup-admin":
    post:
      summary: Setup initial admin
      description: Create the initial admin account. This endpoint should only succeed once
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Admin account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 201
                  message:
                    type: string
                    example: Admin account created
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  links:
                    type: object
                    properties:
                      signIn:
                        type: string
                        format: uri
                        example: "/auth/sign-in"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  "/auth/sign-in":
    post:
      summary: Sign in
      description: Authenticate a user and return an access token and also set a refreshToken HttpOnly cookie.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: example@gmail.com
                password:
                  type: string
                  format: password
                  example: password1234
              required: [email, password]
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 200
                  message:
                    type: string
                    example: Login successful
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  links:
                    type: object
                    properties:
                      self:
                        type: string
                        format: uri
                        example: "/auth/sign-in"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  "/auth/refresh":
    post:
      summary: Refresh access token
      description: >
        Refresh the access token using the refreshToken cookie.
        The refresh token is expected to be stored in an HttpOnly cookie.
      tags: [Auth]
      security:
        - refreshCookie: []
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 200
                  message:
                    type: string
                    example: Token refreshed
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  "/auth/logout":
    post:
      summary: Logout
      description: Logout the current user and invalidate the refresh token.
      tags: [Auth]
      security:
        - bearerAuth: []
          refreshCookie: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 200
                  message:
                    type: string
                    example: Logged out successfully
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  "/auth/verify-email/{token}":
    get:
      summary: Verify email
      description: Verify user email address using the token sent to their email during registration.
      tags: [Auth]
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
            example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
          description: Email verification token
      responses:
        "200":
          description: Email verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 200
                  message:
                    type: string
                    example: Email verified successfully
                  links:
                    type: object
                    properties:
                      signIn:
                        type: string
                        format: uri
                        example: "/auth/sign-in"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  "/auth/resend-verification":
    post:
      summary: Resend verification email
      description: Resend the email verification token to the user's email address.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: example@gmail.com
              required: [email]
      responses:
        "200":
          description: Verification email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 200
                  message:
                    type: string
                    example: Verification email sent
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  "/auth/forgot-password":
    post:
      summary: Forgot password
      description: Request a password reset link to be sent to the user's email address.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: example@gmail.com
              required: [email]
      responses:
        "200":
          description: Password reset email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 200
                  message:
                    type: string
                    example: A password reset link has been sent.
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

  "/auth/reset-password/{token}":
    patch:
      summary: Reset password
      description: Reset user password using the token received via email.
      tags: [Auth]
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
            example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
          description: Password reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  format: password
                  example: newPassword1234
              required: [password]
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 200
                  message:
                    type: string
                    example: Password reset successful
                  links:
                    type: object
                    properties:
                      signIn:
                        type: string
                        format: uri
                        example: "/auth/sign-in"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  "/articles":
    get:
      summary: List published articles
      description: Retrieve published articles visible to the public.
      tags: [Article]
      parameters:
        - $ref: "#/components/parameters/pageParam"
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/sortTypeParam"
        - $ref: "#/components/parameters/sortByParam"
        - $ref: "#/components/parameters/searchParam"
      responses:
        "200":
          description: Return a list of articles
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 200
                  message:
                    type: string
                    example: Data retrieved
                  data:
                    type: array
                    items:
                      allOf:
                        - type: object
                          properties:
                            id:
                              type: string
                              example: 507f1f77bcf86cd799439011
                            title:
                              type: string
                              example: First article
                            cover:
                              type: string
                              format: uri
                              example: "https://s.aws.com/myfirstblog/123.jpg"
                            author:
                              $ref: "#/components/schemas/AuthorDetails"
                            link:
                              type: string
                              format: uri
                              example: "/articles/507f1f77bcf86cd799439011"
                          required: [id, title, author, link]
                        - $ref: "#/components/schemas/Timestamp"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
                  links:
                    type: object
                    properties:
                      self:
                        type: string
                        format: uri
                        example: "/articles?page=2&limit=10"
                      next:
                        type: string
                        format: uri
                        example: "/articles?page=3&limit=10"
                      prev:
                        type: string
                        format: uri
                        example: "/articles?page=1&limit=10"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

    post:
      summary: Create article
      description: Create an article. Requires authentication.
      tags: [Article]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrPutUpdateArticleRequest"
      responses:
        "201":
          $ref: "#/components/responses/ArticleCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  "/articles/all":
    get:
      summary: List all articles
      description: Retrieve all articles, including hidden and published articles. Only admins should be allowed.
      tags: [Article]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/pageParam"
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/sortTypeParam"
        - $ref: "#/components/parameters/sortByParam"
        - $ref: "#/components/parameters/searchParam"
        - in: query
          name: status
          description: Filter articles by publication status
          required: false
          schema:
            type: string
            enum: [hidden, published]
            example: hidden
      responses:
        "200":
          description: Return a list of all articles
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 200
                  message:
                    type: string
                    example: Data retrieved
                  data:
                    type: array
                    items:
                      allOf:
                        - type: object
                          properties:
                            id:
                              type: string
                              example: 507f1f77bcf86cd799439011
                            title:
                              type: string
                              example: First article
                            cover:
                              type: string
                              format: uri
                              example: "https://s.aws.com/myfirstblog/123.jpg"
                            status:
                              type: string
                              enum: [hidden, published]
                              example: hidden
                            author:
                              $ref: "#/components/schemas/AuthorDetails"
                            link:
                              type: string
                              format: uri
                              example: "/articles/507f1f77bcf86cd799439011"
                          required: [id, title, status, author, link]
                        - $ref: "#/components/schemas/Timestamp"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
                  links:
                    type: object
                    properties:
                      self:
                        type: string
                        format: uri
                        example: "/articles/admin?page=2&limit=10"
                      next:
                        type: string
                        format: uri
                        example: "/articles/admin?page=3&limit=10"
                      prev:
                        type: string
                        format: uri
                        example: "/articles/admin?page=1&limit=10"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  "/articles/{id}":
    get:
      summary: Get article
      description: Retrieve a single article. Public access should only return published articles.
      tags: [Article]
      parameters:
        - $ref: "#/components/parameters/idPathParam"
        - in: query
          name: expand
          schema:
            type: string
            example: author,comments
      responses:
        "200":
          description: Retrieved an article
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 200
                  message:
                    type: string
                    example: Data retrieved
                  data:
                    allOf:
                      - $ref: "#/components/schemas/Article"
                      - type: object
                        properties:
                          author:
                            $ref: "#/components/schemas/AuthorDetails"
                      - type: object
                        properties:
                          comments:
                            type: array
                            items:
                              allOf:
                                - $ref: "#/components/schemas/CommentBody"
                                - type: object
                                  properties:
                                    author:
                                      type: string
                                      example: 507f1f77bcf86cd799439011

                  links:
                    type: object
                    properties:
                      self:
                        type: string
                        format: uri
                        example: "/articles/507f1f77bcf86cd799439011"
                      author:
                        type: string
                        format: uri
                        example: "/articles/507f1f77bcf86cd799439011/author"
                      comments:
                        type: string
                        format: uri
                        example: "/articles/507f1f77bcf86cd799439011/comments"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

    put:
      summary: Create or update article
      description: >
        Create or update an article resource. This operation will create a new article if it does not exist, or update the existing article if it already exists.
        Only the article owner or an administrator is authorized to perform this action.
      tags: [Article]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/idPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrPutUpdateArticleRequest"
      responses:
        "200":
          $ref: "#/components/responses/ArticleUpdated"
        "201":
          $ref: "#/components/responses/ArticleCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

    patch:
      summary: Update article
      description: >
        Partially update an article. Only the article owner or an admin should
        be allowed to perform this action.
      tags: [Article]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/idPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchArticleRequest"
      responses:
        "200":
          $ref: "#/components/responses/ArticleUpdated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

    delete:
      summary: Delete article
      description: >
        Delete an article. Only the article owner or an admin should be allowed
        to perform this action.
      tags: [Article]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/idPathParam"
      responses:
        "204":
          description: Article deleted successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  "/articles/{id}/comments":
    get:
      summary: List article comments
      description: >
        Retrieve public comments for a specific article. Hidden comments should
        not be returned to public users.
      tags: [Article]
      parameters:
        - $ref: "#/components/parameters/idPathParam"
        - $ref: "#/components/parameters/pageParam"
        - $ref: "#/components/parameters/limitParam"
      responses:
        "200":
          description: Return a list of comments
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 200
                  message:
                    type: string
                    example: Data retrieved
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/CommentBody"
                        - type: object
                          properties:
                            author:
                              $ref: "#/components/schemas/AuthorDetails"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
                  links:
                    type: object
                    properties:
                      self:
                        type: string
                        format: uri
                        example: "/articles/507f1f77bcf86cd799439011/comments"
                      article:
                        type: string
                        format: uri
                        example: "/articles/507f1f77bcf86cd799439011"
                      prev:
                        type: string
                        format: uri
                        example: "/articles/507f1f77bcf86cd799439011/comments?page=1&limit=10"
                      next:
                        type: string
                        format: uri
                        example: "/articles/507f1f77bcf86cd799439011/comments?page=3&limit=10"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

    post:
      summary: Create article comment
      description: Create a comment for a specific article. Requires authentication.
      tags: [Article]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/idPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArticleCommentRequest"
      responses:
        "201":
          description: Comment posted
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 201
                  message:
                    type: string
                    example: Comment posted
                  data:
                    $ref: "#/components/schemas/CommentBody"
                  links:
                    type: object
                    properties:
                      self:
                        type: string
                        format: uri
                        example: "/articles/507f1f77bcf86cd799439011/comments"
                      article:
                        type: string
                        format: uri
                        example: "/articles/507f1f77bcf86cd799439011"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  "/articles/{id}/author":
    get:
      summary: Get article author
      description: Retrieve author details for an article.
      tags: [Article]
      parameters:
        - $ref: "#/components/parameters/idPathParam"
      responses:
        "200":
          description: Get author details of an article
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 200
                  message:
                    type: string
                    example: Data retrieved
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: 507f1f77bcf86cd799439011
                      name:
                        type: string
                        example: MD Ismile Hosen Siam
                  links:
                    type: object
                    properties:
                      self:
                        type: string
                        format: uri
                        example: "/articles/507f1f77bcf86cd799439011/author"
                      article:
                        type: string
                        format: uri
                        example: "/articles/507f1f77bcf86cd799439011"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  "/comments":
    get:
      summary: List comments
      description: Get all comments including hidden. Only admin should be allowed. Can be filtered by articleId.
      tags: [Comment]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/pageParam"
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/sortTypeParam"
        - $ref: "#/components/parameters/sortByParam"
        - in: query
          name: articleId
          schema:
            type: string
            example: 507f1f77bcf86cd799439011
        - in: query
          name: status
          schema:
            type: string
            enum: [public, hidden]
            example: hidden
      responses:
        "200":
          description: Get all comment data
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 200
                  message:
                    type: string
                    example: Data retrieved
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Comment"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
                  links:
                    type: object
                    properties:
                      self:
                        type: string
                        format: uri
                        example: "/comments?page=2&limit=10"
                      next:
                        type: string
                        format: uri
                        example: "/comments?page=3&limit=10"
                      prev:
                        type: string
                        format: uri
                        example: "/comments?page=1&limit=10"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
