      tags: [User]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 201
                  message:
                    type: string
                    example: Account created
                  data:
                    allOf:
                      - $ref: "#/components/schemas/UserCreateUpdateResponse"
                      - type: object
                        properties:
                          status:
                            type: string
                            enum: [pending, approved, blocked, declined]
                            example: approved
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  "/users/{id}":
    get:
      summary: Get user
      description: Retrieve a single user. Usually restricted to admins or the user themselves.
      tags: [User]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/idPathParam"
        - in: query
          name: expand
          schema:
            type: string
            example: articles,comments
      responses:
        "200":
          description: Retrieved a user
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 200
                  message:
                    type: string
                    example: Data retrieved
                  data:
                    allOf:
                      - $ref: "#/components/schemas/User"
                      - type: object
                        properties:
                          articles:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: string
                                  example: 507f1f77bcf86cd799439011
                                title:
                                  type: string
                                  example: first article
                                status:
                                  type: string
                                  enum: [hidden, published]
                                  example: published
                      - type: object
                        properties:
                          comments:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: string
                                  example: 507f1f77bcf86cd799439011
                                body:
                                  type: string
                                  example: this is a comment
                                status:
                                  type: string
                                  enum: [public, hidden]
                                  example: public
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

    patch:
      summary: Update user
      description: Administrative endpoint to update a user info.
      tags: [User]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/idPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Account updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 200
                  message:
                    type: string
