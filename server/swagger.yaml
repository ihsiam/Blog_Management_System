  "/users/{id}/change-password":
    patch:
      summary: Change password
      description: Change a user's password. Usually restricted to the user themselves.
      tags: [User]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/idPathParam"
