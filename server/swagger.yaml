        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

    refreshCookie:
      type: apiKey
      in: cookie
      name: refreshToken

  schemas:
    Article:
      allOf:
        - type: object
          properties:
            id:
              type: string
              example: 507f1f77bcf86cd799439011
            title:
              type: string
              example: first article
            body:
              type: string
              example: first article body
            cover:
              type: string
              format: uri
              example: https://s.aws.com/myfirstblog/123.jpg
            status:
              type: string
              enum: [hidden, published]
              example: published
          required: [id, title, body, status]
        - $ref: "#/components/schemas/Timestamp"

    User:
      allOf:
        - type: object
          properties:
            id:
              type: string
              example: 507f1f77bcf86cd799439011
            name:
              type: string
              example: MD Ismile Hosen Siam
            email:
              type: string
              format: email
              example: example@gmail.com
            role:
              type: string
              enum: [admin, user]
              example: user
            status:
              type: string
              enum: [pending, approved, blocked, declined]
              example: pending
        - $ref: "#/components/schemas/Timestamp"

    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
          example: MD Ismile Hosen Siam
        email:
          type: string
          format: email
          example: example@gmail.com
        password:
          type: string
          format: password
          example: password1234
      required: [name, email, password]

    UserCreateUpdateResponse:
      allOf:
        - type: object
          properties:
            id:
              type: string
              example: 507f1f77bcf86cd799439011
            name:
              type: string
              example: MD Ismile Hosen Siam
            email:
              type: string
              format: email
              example: example@gmail.com
        - $ref: "#/components/schemas/Timestamp"

    CreateOrPutUpdateArticleRequest:
      type: object
      properties:
        title:
          type: string
          example: first article
        body:
          type: string
          example: first article body
        cover:
          type: string
          format: uri
          example: https://s.aws.com/myfirstblog/123.jpg
      required: [title, body]

    PatchArticleRequest:
      type: object
      properties:
        title:
          type: string
          example: updated title
        body:
          type: string
          example: updated body
        cover:
          type: string
          format: uri
          example: https://s.aws.com/myfirstblog/123.jpg
        status:
          type: string
          enum: [hidden, published]
          example: hidden

    Comment:
      allOf:
        - type: object
          properties:
            id:
              type: string
              example: 507f1f77bcf86cd799439011
            author:
              type: string
              example: 507f1f77bcf86cd799439011
            article:
              type: string
              example: 507f1f77bcf86cd799439011
            body:
              type: string
              example: first comment
            status:
              type: string
              enum: [hidden, public]
              example: public
          required: [id, author, article, body, status]
        - $ref: "#/components/schemas/Timestamp"

    CommentBody:
      allOf:
        - type: object
          properties:
            id:
              type: string
              example: 507f1f77bcf86cd799439011
            body:
              type: string
              example: this is a comment
            status:
              type: string
              enum: [public, hidden]
              example: public
          required: [id, body, status]
        - $ref: "#/components/schemas/Timestamp"

    CreateArticleCommentRequest:
      type: object
      properties:
        body:
          type: string
          example: this is a comment
      required: [body]

    CreateCommentRequest:
      type: object
      properties:
        body:
          type: string
          example: this is a comment
        articleId:
          type: string
          example: 507f1f77bcf86cd799439011
      required: [body, articleId]

    UpdateCommentRequest:
      type: object
      properties:
        body:
          type: string
          example: this is a comment
        status:
          type: string
          enum: [public, hidden]
          example: public

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          example: MD Ismile Hosen Siam
        role:
          type: string
          enum: [user, admin]
          example: user
        status:
          type: string
          enum: [pending, approved, blocked, declined]
          example: approved

    Timestamp:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [createdAt, updatedAt]

    AuthorDetails:
      type: object
      properties:
        id:
          type: string
          example: 507f1f77bcf86cd799439011
        name:
          type: string
          example: Md Ismile Hosen Siam
      required: [id, name]

    Pagination:
      type: object
      properties:
        page:
          type: integer
          format: int32
          example: 2
        limit:
          type: integer
          format: int32
          example: 10
        next:
          type: integer
          format: int32
          example: 3
        prev:
          type: integer
          format: int32
          example: 1
        totalPage:
          type: integer
          format: int32
          example: 20
        totalItems:
          type: integer
          format: int32
          example: 200
      required: [page, limit, totalPage, totalItems]

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
                example: 400
              error:
                type: string
                example: Bad request
              data:
                type: array
                items:
                  type: object
                  properties:
                    field:
                      type: string
                      example: field name
                    message:
                      type: string
                      example: invalid input
                    in:
                      type: string
                      enum: [path, query, header, cookie, body]
                      example: body

    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
                example: 500
              error:
                type: string
                example: Internal server error
              message:
                type: string
                example: We are sorry for the inconvenience. Please try again later.

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
                example: 401
              error:
                type: string
                example: Unauthorized
              message:
                type: string
                example: Unauthorized.

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
                example: 403
              error:
                type: string
                example: Forbidden
              message:
                type: string
                example: You do not have permission.

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
                example: 404
              error:
                type: string
                example: Not found
              message:
                type: string
                example: Requested resource not found

    ArticleCreated:
      description: Article created
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
                example: 201
              message:
                type: string
                example: Article created
              data:
                allOf:
                  - $ref: "#/components/schemas/Article"
                  - type: object
                    properties:
                      author:
                        type: string
                        example: 507f1f77bcf86cd799439011
              links:
                type: object
                properties:
                  self:
                    type: string
                    format: uri
                    example: "/articles/507f1f77bcf86cd799439011"

    ArticleUpdated:
      description: Article updated
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                format: int32
                example: 200
              message:
                type: string
                example: Successfully updated article data
              data:
                allOf:
                  - $ref: "#/components/schemas/Article"
                  - type: object
                    properties:
                      author:
                        type: string
                        example: 507f1f77bcf86cd799439011
              links:
                type: object
                properties:
                  self:
                    type: string
                    format: uri
                    example: "/articles/507f1f77bcf86cd799439011"

  parameters:
    pageParam:
      in: query
      name: page
      description: Current page number
      required: false
      schema:
        type: integer
        format: int32
        default: 1
        example: 2

    limitParam:
      in: query
      name: limit
      description: Number of items to return
      required: false
      schema:
        type: integer
        format: int32
        default: 10
        example: 10

    sortTypeParam:
      in: query
      name: sortType
      description: Sort in ascending or descending order
      required: false
      schema:
        type: string
        enum: [asc, desc]
        example: asc

    sortByParam:
      in: query
      name: sortBy
      description: Sort by updatedAt, createdAt or title
      required: false
      schema:
        type: string
        enum: [updatedAt, createdAt, title]
        example: updatedAt

    searchParam:
      in: query
      name: search
      description: Search article by title
      required: false
      schema:
        type: string
        example: title

    idPathParam:
      in: path
      name: id
      required: true
      schema:
        type: string
        example: 507f1f77bcf86cd799439011
